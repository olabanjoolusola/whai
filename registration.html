<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intelligence and Imitation | Registration</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
body{font-family:Inter, sans-serif;}
h1,h2{font-family:Playfair Display, serif;}

.navbar{background:rgba(15,23,42,0.95); backdrop-filter:blur(12px); padding:0.85rem 0;}
.navbar-brand{color:#fff !important; font-weight:800;}
.nav-link{color:rgba(255,255,255,0.9) !important;}
.nav-link.active,.nav-link:hover{color:#fff !important;}

.page-hero{
  padding:9rem 0 4rem;
  background:linear-gradient(120deg,rgba(10,15,30,.9),rgba(43,27,92,.7));
  color:#fff;
}

.section{padding:5rem 0;}

.form-card{
  background:#fff;
  padding:2rem;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,.08);
}

.btn-brand{
  background:linear-gradient(135deg,#1d4ed8,#7c3aed);
  color:#fff;
  border:none;
  padding:12px 20px;
  border-radius:999px;
}

.success-box{
  display:none;
  background:#e6fffa;
  padding:15px;
  border-radius:10px;
  color:#065f46;
}

.footer{background:#0f172a;color:#fff;padding:2rem 0;}
</style>
</head>

<body>

<!-- NAV -->
<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
<div class="container">
<a class="navbar-brand" href="index.html">
Intelligence & Imitation
<span style="display:block;font-size:0.78rem;">Mind, Mechanism, Mimesis • 2026</span>
</a>
</div>
</nav>

<!-- HERO -->
<section class="page-hero text-center">
<div class="container">
<h1>Registration</h1>
<p>Register to attend the Intelligence and Imitation Conference.</p>
</div>
</section>

<!-- FORM -->
<section class="section">
<div class="container">
<div class="row justify-content-center">
<div class="col-lg-6">

<div class="form-card">

<div id="successBox" class="success-box mb-3">
Registration successful! We will contact you shortly.
</div>

<form id="registrationForm">

<div class="mb-3">
<label class="form-label">Full Name</label>
<input type="text" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Email</label>
<input type="email" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Institution</label>
<input type="text" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">Category</label>
<select class="form-select">
<option>Student</option>
<option>Academic</option>
<option>Industry</option>
</select>
</div>

<button type="submit" class="btn btn-brand w-100">Submit Registration</button>

</form>

</div>

</div>
</div>
</div>
</section>

<!-- FOOTER -->
<footer class="footer text-center">
<div class="container">
<p>© 2026 Intelligence and Imitation Conference</p>
</div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
document.getElementById("registrationForm").addEventListener("submit", function(e){
    e.preventDefault();

    // show success message
    document.getElementById("successBox").style.display = "block";

    // reset form
    this.reset();
});
</script>

</body>
</html>
